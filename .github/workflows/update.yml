name: Daily Meta Update

on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC (1am Costa Rica) todos los días
  workflow_dispatch:        # también permite correrlo manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # necesario para hacer commit

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run daily update
        id: update
        run: |
          python scripts/update_daily.py
          echo "changed=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit and push if changed
        if: steps.update.outputs.changed == '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/tournaments.json scripts/pastes_cache.json || true
          git diff --staged --quiet || git commit -m "chore: daily meta update $(date +'%Y-%m-%d')"
          git push
